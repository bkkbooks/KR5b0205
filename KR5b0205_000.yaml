front:
  text: 玉籙大齋第二日午朝儀
  hash: sha256:47b8337db6bc4485db798079d0d6e228174cde0671863439b19d0c1c59320b1a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0205_HFL_000-001a, image: hfl/0269/0269-076.png}
body:
  text: 各禮師存念如法黄中䇿炁斬妖滅蹤制遏邪源斷截魔宗太上符命召制神公萬神斯格却禍除凶五炁三輪洞逹真風紫戸合瓊六度無終左命青腰右攝芝童逍遥飄景總御九空玄壇應機乗炁虚沖萬真普降濟度無窮發爐同早朝請稱法位具位與臨壇官衆等謹同誠上啓虚无自然元始天尊无極大道太上道君太上老君髙上玉皇十方巳得道大聖衆至真諸君丈人三十二天帝君玉虚上帝玉帝大帝東華南極西靈北眞玄都玉京金闕七寳瓊臺紫微上宫靈寳至眞明皇道君三十六部尊經玄中大法師上相上宰上保上傅大平下教二十四眞人西城惣眞王君太乙眞人東嶽上卿司命茅君定録保命二眞人名山洞府得道神仙三界官屬一切眞靈臣聞五度凝精巳兆丹光之祖三陽隱妙難窮浩劫之先虚廓無形幽寥罔象結梵靈之元炁開神運於赤明敷落五篇彌羅萬範靈寳出金書之奥鳳曆流通洞玄垂玉字之芒龍文安鎮度人无量保天長存臣等忝紹仙宗叨承正一泛朱英而襲慶誦詠瓊音傳符籙於名山遵修寳範凡有所啓敢不上聞齋意青詞謹當宣奏宣詞具如詞言不違懇欵恩惟大道分别哀祈臣聞太極金書飛二景玄眞之寳紫霞玉彩流九霄神境之光龍躍虎蹲鳳翔鸞舞臣等晝接眞靈午臨壇墠陽晶麗正測圭景以方中華曜舒光瞻丹輪而未昃引法界虚无之聖聚靈風鬱勃之烟恭假香傳奉修齋直以今中分行道請法衆等運兹初捻上香願此香烟騰空徑上供養虚无至眞自然大道元始天尊願以是捻香功德上祝當今皇帝聖壽無疆伏願永御九重備膺五福垂衣致治長臨南面之朝居正體元端拱北辰之所履至尊而久視保榮祚以無疆帝命日新神基天峻克綏四海丕演萬年今故燒香自皈依道尊大聖衆至眞之德得道之後祈天長存臣聞金闕玉房儲寳笈琅函之祕瑶臺朱圃顯雲章霞篆之祥光煥九天芒垂八角以今中分行道請法衆等運兹二捻上香願此香烟騰空徑上供養玉晨至聖自然靈寳大道天尊願以是捻香功德上資國祚宗枝伏願四塞向風諸藩慕義梯山航海皆爲入貢之臣交趾雕題盡効來朝之職極乾坤之覆載窮日月之照臨冠帶百蠻車書一軌咸臻安靜各遂生成今故燒香自皈依經尊大聖衆至眞之德得道之後昇入無形臣聞元始開圖妙剖判隂陽之本元綱流演明生成造化之源難終難窮莫名莫測以今中分行道請法衆等運兹三捻上香願此香烟騰空徑上供養混元大聖自然化主道德天尊願以是捻香功德上資所薦神靈伏願錬炁無英回靈驕樂黄華蕩質俾臓腑之清涼紫戸生仙總形神而整具參帝真而結命慶玉女以灌香探入飛空起離舊爽攝召辰夜開度受生今故燒香自皈依師尊大聖衆至眞之德得道之後昇入無形懴悔三啓三禮重稱法位具位與臨壇官衆等謹同誠上啓三清至尊十方上聖玉京金闕天帝天真十方師尊聖衆三界官屬一切威靈臣聞五帝朝真罄精修於五體十天降命咸普度於十回臣等宿應玄圖忝承眞誥所冝歩太霞而泛景嘯朗九霄御白日以登晨飛形三景自受丹書之啓誓獲傳黄素之成章不負初心仰弘大教欽承詞㫖謹爲典行伏慮孤魂滯魄自從宿世以及今身舉意故爲動情悮犯未能持身不益損巳爲先嗜利無厭弗守固窮之志臨財苟取不萌見得之思或閉吝於巳資或侵攘於他物自求豐殖罔恤困窮既乖推義之心實負保眞之戒恐成愆對未卜升沉又慮恣迷貪累以苦形展轉塵勞而忘本禍招億劫罪積萬端或沉淪於泉曲河源未出離於寒庭隂境祈哀大道請命至眞冀超黒壤之拘囚是仗玄都之開宥伏願恩覃十極澤被萬方赤龍飛負於寳章丹鳳驛傳於青籙命魔三界宣敕九門金簡玉符普開明於長夜朱書紫策下超度於重隂又乞三天師恩玄中教主召靈官於三洞勑掾吏於九泉及召四始三元二十八治符章曹局監察官君五嶽神司九州社令捧持符赦告下冥曹攝召亡魂齊到帝所宣九過慶東向以受生普度十回升南宫而錬質徹天響地御炁生神普令有識之含靈咸得往生而隨願則上明天尊大慈之化下副臣等皈命之誠謹啓以聞一願恩覃宇宙二願澤被幽明三願青華度命四願玉簡開扃五願神眞降盻六願壇陛通靈七願亡魂返妙八願滯魄超升九願四司禀敕十願五帝監生十一願靈光下燭十二願功果咸成復爐同早朝玉籙大齋第二日午朝儀
